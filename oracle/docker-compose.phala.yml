services:
  oracle:
    image: kkoci/arcid2-oracle:latest
    platform: linux/amd64
    ports:
      - "3001:3001"
    volumes:
      # The dstack guest agent isn't exposed over TCP at all — it's a Unix domain socket
      # on the CVM host. @phala/dstack-sdk's DstackClient() auto-probes /var/run/dstack.sock
      # inside the container, so mount the host socket at that same path. If this dstack
      # version uses the older /var/run/tappd.sock name instead, change the host-side path
      # (left of the colon) accordingly — the container-side path should stay as-is.
      - /var/run/dstack.sock:/var/run/dstack.sock
    environment:
      PORT: "3001"
      USE_REAL_PHALA: "true"
      # Injected via Phala Cloud dashboard (Secrets tab) — do not commit values here:
      ORACLE_PRIVATE_KEY: "${ORACLE_PRIVATE_KEY}"
      ORACLE_WALLET_ADDRESS: "${ORACLE_WALLET_ADDRESS}"
      ARC_RPC_URL: "${ARC_RPC_URL}"
      BOND_CONTRACT_ADDRESS: "${BOND_CONTRACT_ADDRESS}"
      REGISTRY_ADDRESS: "${REGISTRY_ADDRESS}"
      DEPLOY_BLOCK: "${DEPLOY_BLOCK}"
      CONSUMER_PRIVATE_KEY: "${CONSUMER_PRIVATE_KEY}"
      CONSUMER_WALLET_ADDRESS: "${CONSUMER_WALLET_ADDRESS}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      DEV_MODE: "false"
      ARC_NETWORK: "arc-testnet"
      MAX_AGE_SECONDS: "30"
